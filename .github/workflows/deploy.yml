name: Deploy to Hostinger

on:
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          SANITY_PROJECT_ID: ${{ secrets.SANITY_PROJECT_ID }}
          SANITY_DATASET: ${{ secrets.SANITY_DATASET }}

      - name: Verify critical pages are not SPA shells
        run: |
          grep -q "Industrial AI that reads your factory floor" out/index.html \
            || (echo "FAIL: homepage is an empty SPA shell — aborting deploy" && exit 1)
          test -f out/sitemap.xml  || (echo "FAIL: sitemap missing"    && exit 1)
          test -f out/robots.txt   || (echo "FAIL: robots.txt missing" && exit 1)
          test -f out/llms.txt     || (echo "FAIL: llms.txt missing"   && exit 1)
          test -f out/products/sam-v3/index.html \
            || (echo "FAIL: product page missing" && exit 1)
          echo "All pre-deploy verification checks passed"

      - name: Deploy via FTPS to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:                ${{ secrets.HOSTINGER_FTP_HOST }}
          username:              ${{ secrets.HOSTINGER_FTP_USER }}
          password:              ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          local-dir:             ./out/
          server-dir:            ${{ secrets.HOSTINGER_REMOTE_PATH }}
          dangerous-clean-slate: false
          protocol:              ftps
          port:                  21
